name: Deploy to Cloudflare Pages (DISABLED - Deploy manually from local)

on:
  # Disabled automatic deployment - deploy manually with: npx wrangler pages deploy public --project-name=interactive-pdf
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'public/**'
  #     - 'wrangler-pages.toml'
  #     - '.github/workflows/cloudflare-pages.yml'
  workflow_dispatch:  # Can still trigger manually from Actions tab if needed

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Wrangler
        run: npm install -g wrangler@3.78.0
      
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy public --project-name=interactive-pdf --config=wrangler-pages.toml
