<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazine Flipbook - 3C Public Library</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- jQuery (required for turn.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Turn.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <!-- Cloudflare Stream Player -->
    <script src="https://embed.cloudflarestream.com/embed/sdk.latest.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #toolbar {
            background: rgba(42, 42, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        #toolbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #toolbar-center {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #toolbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.5);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        #page-info {
            color: #aaa;
            font-size: 16px;
            font-weight: 500;
            min-width: 150px;
            text-align: center;
        }

        #flipbook-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            perspective: 2000px;
        }

        #flipbook {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .page {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .page canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .page-number {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: #666;
            font-size: 14px;
            font-weight: 600;
        }

        /* Video Overlay - Same as before */
        #video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }

        #video-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #video-container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        #video-player-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        #video-player-wrapper stream,
        #video-player-wrapper iframe,
        #video-player-wrapper video,
        #video-player-wrapper audio,
        #video-player-wrapper img {
            width: 100%;
            height: 100%;
            border: none;
        }

        #close-video {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 50px;
            height: 50px;
            background: #ff4757;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10000;
        }

        #close-video:hover {
            background: #ff3838;
            transform: rotate(90deg) scale(1.1);
        }

        #video-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Loading spinner */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #4a90e2;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
        }

        #loading.hidden {
            display: none;
        }

        #loading p {
            margin-top: 20px;
            font-size: 16px;
            color: #aaa;
        }

        /* Navigation hints */
        .nav-hint {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(74, 144, 226, 0.2);
            padding: 20px;
            border-radius: 10px;
            font-size: 14px;
            color: #4a90e2;
            animation: pulse 2s infinite;
            z-index: 50;
        }

        .nav-hint.left {
            left: 20px;
        }

        .nav-hint.right {
            right: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Zoom controls */
        #zoom-level {
            color: #aaa;
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <div id="toolbar-left">
            <h2>📖 Magazine Flipbook</h2>
        </div>
        
        <div id="toolbar-center">
            <button id="first-page" class="btn">⏮ First</button>
            <button id="prev-page" class="btn">← Previous</button>
            <span id="page-info">Page <span id="current-page">1</span> of <span id="total-pages">1</span></span>
            <button id="next-page" class="btn">Next →</button>
            <button id="last-page" class="btn">Last ⏭</button>
        </div>
        
        <div id="toolbar-right">
            <a href="index.html" class="btn" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">🏠 Return to Builder</a>
            <div class="btn-icon" id="zoom-out" title="Zoom Out">-</div>
            <span id="zoom-level">100%</span>
            <div class="btn-icon" id="zoom-in" title="Zoom In">+</div>
            <button id="download-pdf" class="btn">⬇ Download</button>
        </div>
    </div>

    <!-- Flipbook Container -->
    <div id="flipbook-container">
        <div id="flipbook"></div>
        
        <!-- Navigation Hints -->
        <div class="nav-hint left">← Drag or click to turn page</div>
        <div class="nav-hint right">Drag or click to turn page →</div>
    </div>

    <!-- Video Overlay -->
    <div id="video-overlay">
        <div id="video-container">
            <button id="close-video">✕</button>
            <div id="video-title"></div>
            <div id="video-player-wrapper"></div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading magazine...</p>
    </div>

    <script src="flipbook.js"></script>
</body>
</html>
