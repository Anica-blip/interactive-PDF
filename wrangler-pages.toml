# Cloudflare Pages Configuration for Interactive PDF Builder
# This file tells Cloudflare how to deploy your Pages project from GitHub

name = "interactive-pdf"
compatibility_date = "2024-01-01"

# Pages Configuration
pages_build_output_dir = "public"

# Environment Variables (set these in Cloudflare Dashboard)
# These are just placeholders - actual values are set in Cloudflare Pages settings
[vars]
R2_PUBLIC_URL = "https://files.3c-public-library.org"

# Production Environment
[env.production]
name = "interactive-pdf"
vars = { ENVIRONMENT = "production", R2_PUBLIC_URL = "https://files.3c-public-library.org" }

# Preview Environment (for branch deployments)
[env.preview]
name = "interactive-pdf-preview"
vars = { ENVIRONMENT = "preview", R2_PUBLIC_URL = "https://files.3c-public-library.org" }
